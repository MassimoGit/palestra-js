<nav class="navbar navbar-expand-md navbar-dark mb-4">
  <div class="container">
    <span class="navbar-brand fw-bold fs-5">
      <i class="bi bi-person-workspace me-2"></i>Gestione Palestra
    </span>
    <div class="btn-group" role="group" aria-label="Navigazione sezioni">
      <button
        class="btn btn-outline-light"
        [class.active]="view() === 'trainers'"
        (click)="setView('trainers')"
      >
        <i class="bi bi-person-badge me-1"></i>Allenatori
      </button>
      <button
        class="btn btn-outline-light"
        [class.active]="view() === 'customers'"
        (click)="setView('customers')"
      >
        <i class="bi bi-people me-1"></i>Clienti
      </button>
    </div>
  </div>
</nav>

<main class="container mb-5 flex-grow-1">
  @if (view() === 'trainers') {
    <app-trainer-list [trainers]="trainers()" />
  }

  @if (view() === 'customers') {
    <app-customer-form
      [trainers]="trainers()"
      [initialCustomer]="editingCustomer()"
      (save)="onSaveCustomer($event)"
      (cancel)="onCancelEdit()"
    />
    <h2 class="mb-3">Clienti</h2>
    <app-customer-list
      [customers]="customers()"
      (edit)="onEditCustomer($event)"
      (delete)="onDeleteCustomer($event)"
    />
  }
</main>

<footer class="py-3 mt-auto">
  <div class="container text-center">
    <span><i class="bi bi-dumbbell me-1"></i>Gestione Palestra &mdash; soluzione Angular</span>
  </div>
</footer>
